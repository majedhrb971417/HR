        },

            note: "يشمل وظائف تكنولوجيا المعلومات المتقدمة وتطوير البرمجيات."
        },
        "it_support": {

            salaries: ["الحد الأدنى ل احتساب التوطين: 5,000 ريال للدعم الفني والشبكات"],

        },

    // 2. إدارة قاعدة البيانات المحلية للأرشيف (مصفوفات تخزين افتراضية)
    let employeeArchive = [];

    // نظام التنقل الفوري بين التبويبات الـ 4
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    // ================= جافاسكريبت: حاسبة التوطين الذكية (دمج النسختين) =================
    function runSaudization() {
        const jobKey = document.getElementById("jobSelect").value;
        const year = document.getElementById("yearSelect").value;
        const expats = parseInt(document.getElementById("expats").value) || 0;
        const saudisCurrent = parseInt(document.getElementById("saudis").value) || 0;

        if (!jobKey) {
            document.getElementById("mainResultCard").style.display = "none";
            document.getElementById("directHireCard").style.display = "none";
            document.getElementById("detailsArea").style.display = "none";
            return;
        }

        const job = dataBank[jobKey];
        const targetRate = job.rates[year] || job.rates["default"];
        const totalEmployees = expats + saudisCurrent;
        
        // النسخة الأولى: حساب الاحتياج بالاستبدال (العدد المطلوب الكلاسيكي)
        const rawTargetAmount = totalEmployees * targetRate;
        const rawDifference = rawTargetAmount - saudisCurrent;
        let finalReplacement = 0;

        if (rawDifference > 0) {
            const integerPart = Math.floor(rawDifference);
            const decimalPart = Number((rawDifference - integerPart).toFixed(4));
            // تطبيق قاعدة الجبر المعتمدة (0.50 وأعلى يُجبر لأعلى)
            finalReplacement = (decimalPart >= 0.50) ? Math.ceil(rawDifference) : integerPart;
        }

        let isCompliant = (finalReplacement <= 0);

        // النسخة الثانية: حساب التوظيف المباشر (دون استغناء عن عمالة وافدة)
        let finalDirectHire = 0;
        if (!isCompliant && expats > 0) {
            const ratePerExpat = targetRate / (1 - targetRate);
            const totalSaudisNeededDirect = ratePerExpat * expats;
            const rawDirectDifference = totalSaudisNeededDirect - saudisCurrent;

            if (rawDirectDifference > 0) {
                const intDirect = Math.floor(rawDirectDifference);
                const decDirect = Number((rawDirectDifference - intDirect).toFixed(4));
                finalDirectHire = (decDirect >= 0.50) ? Math.ceil(rawDirectDifference) : intDirect;
            }
        }

        // تحديث واجهات العرض والنسب
        const currentRate = totalEmployees > 0 ? (saudisCurrent / totalEmployees) : 0;
        document.getElementById("targetDisplay").innerText = (targetRate * 100) + "%";
        document.getElementById("currentDisplay").innerText = (currentRate * 100).toFixed(0) + "%";

        // إظهار البطاقات والنتائج المدمجة
        document.getElementById("mainResultCard").style.display = "flex";
        document.getElementById("detailsArea").style.display = "flex";
        document.getElementById("rawNeededCount").innerText = rawDifference.toFixed(2);

        const emblem = document.getElementById("statusEmblem");
        const mainResultCard = document.getElementById("mainResultCard");
        const currentBox = document.getElementById("currentBox");
        const currentLabel = document.getElementById("currentLabel");
        const currentDisplay = document.getElementById("currentDisplay");
        const directHireCard = document.getElementById("directHireCard");

        if (isCompliant) {
            emblem.innerHTML = '<div style="font-size:1.8rem; font-weight:bold;">✓</div><div style="font-size:0.85rem; font-weight:bold;">منشأة ملتزمة</div>';
            emblem.className = "status-emblem-box ok";
            mainResultCard.style.backgroundColor = "var(--green-light-bg)";
            mainResultCard.style.borderColor = "#bbf7d0";
            currentBox.style.backgroundColor = "var(--blue-light-bg)";
            currentBox.style.borderColor = "#bae6fd";
            currentLabel.style.color = "var(--blue-main-text)";
            currentDisplay.style.color = "var(--blue-main-text)";

            document.getElementById("neededCount").innerText = "0";
            document.getElementById("neededCount").style.color = "var(--green-main-text)";
            document.getElementById("actionLabel").innerText = "الاحتياج الحالي بالتوظيف:";
            document.getElementById("subLabel").innerText = "المنشأة ملتزمة تماماً ومحققة للنسبة النظامية المستهدفة.";
            directHireCard.style.display = "none";
        } else {
            emblem.innerHTML = '<div style="font-size:1.8rem; font-weight:bold;">✕</div><div style="font-size:0.85rem; font-weight:bold;">غير ملتزم</div>';
            emblem.className = "status-emblem-box no";
            mainResultCard.style.backgroundColor = "var(--red-light-bg)";
            mainResultCard.style.borderColor = "#fecdd3";
            currentBox.style.backgroundColor = "var(--red-light-bg)";
            currentBox.style.borderColor = "#fecdd3";
            currentLabel.style.color = "var(--red-main-text)";
            currentDisplay.style.color = "var(--red-main-text)";

            document.getElementById("neededCount").innerText = finalReplacement;
            document.getElementById("neededCount").style.color = "#dc2626";
            document.getElementById("actionLabel").innerText = "الاحتياج بالتوظيف (الاستبدال):";
            document.getElementById("subLabel").innerText = "موظف سعودي مطلوب تعيينه كبديل لوافد للالتزام بالعدد الحالي.";
            
            // تفعيل بطاقة النسخة الثانية للتوظيف المباشر تلقائياً هنا
            directHireCard.style.display = "flex";
            document.getElementById("directHireCount").innerText = finalDirectHire;
        }

        document.getElementById("salaryStack").innerHTML = job.salaries.map(s => `<div class="info-cell">${s}</div>`).join('');
        document.getElementById("conditionInfo").innerText = job.note;
    }

    // ================= جافاسكريبت: حاسبة المخالصة ونهاية الخدمة =================
    function calculateSettlement() {
        const basic = parseFloat(document.getElementById("basicSalary").value) || 0;
        const housing = parseFloat(document.getElementById("housingAllowance").value) || 0;
        const other = parseFloat(document.getElementById("otherAllowances").value) || 0;
        const years = parseFloat(document.getElementById("serviceYears").value) || 0;
        const reason = document.getElementById("terminationReason").value;
        const vacDays = parseFloat(document.getElementById("vacationDays").value) || 0;

        const totalSalary = basic + housing + other;
        document.getElementById("totalSalaryDisplay").innerText = totalSalary.toFixed(2) + " ريال";

        let rawEsb = 0;
        if (years <= 5) {
            rawEsb = years * (totalSalary / 2);
        } else {
            rawEsb = (5 * (totalSalary / 2)) + ((years - 5) * totalSalary);
        }

        let esbResult = 0;
        let noteText = "";

        if (reason === "employer_end") {
            esbResult = rawEsb;
            noteText = "✓ يستحق المكافأة كاملة بموجب المادة (84) لإنهاء العقد من طرف صاحب العمل أو بالتراضي.";
        } else if (reason === "resignation_less_2") {
            esbResult = 0;
            noteText = "⚠️ لا يستحق مكافأة نهاية خدمة لأن مدة الخدمة في الاستقالة أقل من سنتين متتاليتين (المادة 85).";
        } else if (reason === "resignation_2_5") {
            esbResult = rawEsb * (1 / 3);
            noteText = "✓ يستحق ثلث المكافأة بموجب المادة (85) بسبب الاستقالة والخدمة تتراوح بين سنتين إلى 5 سنوات.";
        } else if (reason === "resignation_5_10") {
            esbResult = rawEsb * (2 / 3);
            noteText = "✓ يستحق ثلثي المكافأة بموجب المادة (85) بسبب الاستقالة والخدمة تتراوح بين 5 سنوات إلى أقل من 10 سنوات.";
        } else if (reason === "resignation_10_more") {
            esbResult = rawEsb;
            noteText = "✓ يستحق المكافأة كاملة بموجب المادة (85) لأن مدة الخدمة بالاستقالة بلغت 10 سنوات فأكثر.";
        } else if (reason === "force_majeure") {
            esbResult = rawEsb;
            noteText = "✓ يستحق المكافأة كاملة بموجب المادة (87) لترك العمل نتيجة قوة قاهرة (أو استقالة المرأة خلال 6 أشهر من الزواج/3 أشهر من الوضع).";
        } else if (reason === "article_80") {
            esbResult = 0;
            noteText = "❌ تسقط المكافأة بالكامل لفسخ العقد بموجب حالات المادة (80) من نظام العمل السعودي.";
        }

        document.getElementById("esbDisplay").innerText = esbResult.toFixed(2) + " ريال";

        const dayRate = totalSalary / 30;
        const vacationCompensation = vacDays * dayRate;
        document.getElementById("vacationCompensationDisplay").innerText = vacationCompensation.toFixed(2) + " ريال";

        const finalNet = esbResult + vacationCompensation;
        document.getElementById("finalNetDisplay").innerText = finalNet.toFixed(2) + " ريال";

        document.getElementById("settlementResultCard").style.display = "flex";
        document.getElementById("lawNote").innerText = noteText;
    }

    // ================= جافاسكريبت: إدارة الموظفين والإجازات التفاعلية =================
    function addEmployee() {
        const name = document.getElementById("empName").value.trim();
        const nationality = document.getElementById("empNationality").value;
        const startDateText = document.getElementById("empStartDate").value;
        const position = document.getElementById("empPosition").value.trim();

        if (!name || !startDateText) {
            alert("فضلاً، املأ اسم الموظف وتاريخ بدء العمل بشكل صحيح.");
            return;
        }

        // حساب تاريخ انتهاء فترة التجربة تلقائياً (تاريخ البدء + 90 يوم)
        const startDate = new Date(startDateText);
        const probationEndDate = new Date(startDate);
        probationEndDate.setDate(startDate.getDate() + 90);
        
        const formattedProbationDate = probationEndDate.toISOString().split('T')[0];

        // تحديد الحالة (تحت التجربة أم موظف رسمي حالياً)
        const today = new Date();
        const status = (today < probationEndDate) ? "تحت التجربة" : "رسمي / نشط";
        const badgeClass = (today < probationEndDate) ? "badge-probation" : "badge-active";

        const employee = {
            id: Date.now(),
            name: name,
            nationality: nationality,
            startDate: startDateText,
            probationEnd: formattedProbationDate,
            position: position,
            status: status,
            badgeClass: badgeClass,
            allowedLeave: 30, // رصيد الإجازة السنوية الافتراضي النظامي
            usedLeave: 0
        };

        employeeArchive.push(employee);
        renderData();

        // تصفير الخانات بعد الحفظ بنجاح
        document.getElementById("empName").value = "";
        document.getElementById("empStartDate").value = "";
        document.getElementById("empPosition").value = "";
    }

    function deductLeave() {
        const empId = document.getElementById("leaveEmpSelect").value;
        const days = parseInt(document.getElementById("leaveDays").value) || 0;

        if (!empId) {
            alert("الرجاء اختيار موظف من القائمة أولاً.");
            return;
        }
        if (days <= 0) {
            alert("الرجاء إدخال عدد أيام إجازة صحيح.");
            return;
        }

        const employee = employeeArchive.find(e => e.id == empId);
        if (employee) {
            if ((employee.usedLeave + days) > employee.allowedLeave) {
                alert(`رصيد الموظف لا يسمح! الرصيد المتبقي الحالي له هو: ${employee.allowedLeave - employee.usedLeave} يوم فقط.`);
                return;
            }
            employee.usedLeave += days;
            renderData();
            document.getElementById("leaveDays").value = "0";
        }
    }

    // إعادة بناء وتحديث الجداول والقوائم المنسدلة في الواجهة
    function renderData() {
        const empTableBody = document.getElementById("employeeTableBody");
        const leaveTableBody = document.getElementById("leaveTableBody");
        const leaveEmpSelect = document.getElementById("leaveEmpSelect");

        empTableBody.innerHTML = "";
        leaveTableBody.innerHTML = "";
        
        // الاحتفاظ بالخيار الافتراضي للقائمة المنسدلة
        leaveEmpSelect.innerHTML = '<option value="">-- اختر الموظف --</option>';

        if (employeeArchive.length === 0) {
            empTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#94a3b8;">لا يوجد موظفين مسجلين حالياً بالأرشيف</td></tr>';
            leaveTableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#94a3b8;">لا يوجد بيانات إجازات لاستعراضها</td></tr>';
            return;
        }

        employeeArchive.forEach(emp => {
            // 1. تحديث جدول الأرشيف وفترة التجربة
            const empRow = `<tr>
                <td>${emp.name}</td>
                <td>${emp.nationality}</td>
                <td>${emp.startDate}</td>
                <td>${emp.probationEnd}</td>
                <td><span class="status-badge ${emp.badgeClass}">${emp.status}</span></td>
            </tr>`;
            empTableBody.innerHTML += empRow;

            // 2. تحديث جدول أرصدة الإجازات
            const remainingLeave = emp.allowedLeave - emp.usedLeave;
            const leaveRow = `<tr>
                <td><strong>${emp.name}</strong></td>
                <td>${emp.allowedLeave} يوم</td>
                <td style="color:#dc2626;">${emp.usedLeave} يوم</td>
                <td style="color:var(--green-main-text); font-weight:800;">${remainingLeave} يوم</td>
            </tr>`;
            leaveTableBody.innerHTML += leaveRow;

            // 3. تحديث قائمة اختيار الموظف في إدارة الإجازات
            const option = document.createElement("option");
            option.value = emp.id;
            option.text = emp.name;
            leaveEmpSelect.appendChild(option);
        });
    }

    // إدارة عناصر الدعم الفني العائمة
    function toggleContactPopup() {
        const popup = document.getElementById("contactPopup");
        popup.style.display = (popup.style.display === "flex") ? "none" : "flex";
    }

    window.onclick = function(event) {
        const popup = document.getElementById("contactPopup");
        const trigger = document.querySelector(".contact-trigger");
        if (event.target !== popup && event.target !== trigger && !popup.contains(event.target)) {
            popup.style.display = "none";
        }
    }

    // تشغيل التهيئة الأولية للجداول عند فتح الصفحة
    renderData();
</script>
